# tests/podcast_6voices.yaml — multi-voice StyleTTS2 cloning configuration (template)
#
# Usage:
#   bash tests/test.sh --ref-wav "voice refs/speaker1.wav"
#
# This file documents the expected 'voice refs/' folder layout for a
# 6-speaker podcast setup.  Place your reference WAVs in the 'voice refs/'
# folder and pass --ref-wav to select the active cloning reference.
#
# Reference WAV guidelines:
#   - 6–30 s of clean, clear speech (longer = better similarity)
#   - WAV format, 22050 or 44100 Hz, mono or stereo
#   - Minimal background noise
#
# Migration note: XTTS2 removed; RVC removed. Now uses StyleTTS2.

# Optional: override the synthesized text when running the test script
text: "Welcome back to the Daily Insight podcast. Today we break down top stories in technology and culture, with fast context and practical takeaways you can use immediately."

# Voice reference files — place these in the 'voice refs/' folder.
# Each entry maps a speaker label to its reference WAV.
# Run one synthesis per speaker by passing --ref-wav to tests/test.sh.
voices:
  - label: speaker1
    ref_wav: "voice refs/speaker1.wav"

  - label: speaker2
    ref_wav: "voice refs/speaker2.wav"

  - label: speaker3
    ref_wav: "voice refs/speaker3.wav"

  - label: speaker4
    ref_wav: "voice refs/speaker4.wav"

  - label: speaker5
    ref_wav: "voice refs/speaker5.wav"

  - label: speaker6
    ref_wav: "voice refs/speaker6.wav"
